name: FastAPI CI/CD — Dockerized VM Deploy

# Real, working pipeline pushed by `vxcli cicd pipeline create --stack python`.
# Stage 1 (build): builds the repo's own Dockerfile and smoke-tests the image.
# Stage 2 (deploy): clones/pulls the repo on the target VM and brings the
#                    stack up with docker compose, then health-checks publicly.
#
# Required repo secrets (set by the vxcli tooling or `gh secret set`):
#   VM_HOST    - target VM public IP
#   VM_USER    - ssh user (root / ubuntu)
#   VM_SSH_KEY - private key (OpenSSH/PEM) for that user

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: fastapi-cicd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  APP_NAME: vxcloud-quickstart-fastapi
  REPO_URL: https://github.com/joelwembo/vxcloud-quickstart-fastapi.git
  DEPLOY_PORT: "8000"

jobs:
  build:
    name: Build & smoke-test Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.APP_NAME }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test the container
        run: |
          set -e
          docker run -d --name ci_smoke -p 8000:8000 "${APP_NAME}:ci-${GITHUB_SHA}"
          ok=""
          for i in $(seq 1 40); do
            if curl -fsS http://localhost:8000/docs >/dev/null 2>&1 \
               || curl -fsS http://localhost:8000/health >/dev/null 2>&1 \
               || curl -fsS http://localhost:8000/ >/dev/null 2>&1; then
              ok=1; echo "✅ container responded"; break
            fi
            sleep 3
          done
          echo "----- container logs -----"
          docker logs ci_smoke 2>&1 | tail -n 40 || true
          docker rm -f ci_smoke >/dev/null 2>&1 || true
          [ -n "$ok" ] || { echo "❌ container did not become healthy"; exit 1; }

  deploy:
    name: Deploy to VM (docker compose)
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 25m
          envs: APP_NAME,REPO_URL,DEPLOY_PORT
          script: |
            set -euo pipefail
            export COMPOSE_INTERACTIVE_NO_CLI=1 DEBIAN_FRONTEND=noninteractive
            command -v git >/dev/null 2>&1 || { apt-get update -y || true; apt-get install -y git || true; }
            APP_DIR="/opt/vxcloud/${APP_NAME}"
            mkdir -p /opt/vxcloud
            if [ -d "${APP_DIR}/.git" ]; then
              cd "${APP_DIR}"
              git fetch --all --prune
              git reset --hard origin/main
            else
              rm -rf "${APP_DIR}"
              git clone --depth 1 "${REPO_URL}" "${APP_DIR}"
              cd "${APP_DIR}"
            fi
            if docker compose version >/dev/null 2>&1; then DC="docker compose"; else DC="docker-compose"; fi
            PORT="${DEPLOY_PORT}" ${DC} -p "${APP_NAME}" up -d --build --force-recreate
            ${DC} -p "${APP_NAME}" ps
            docker image prune -f >/dev/null 2>&1 || true

      - name: Public health check
        run: |
          set -e
          for i in $(seq 1 40); do
            if curl -fsS "http://${{ secrets.VM_HOST }}:${DEPLOY_PORT}/docs" >/dev/null 2>&1 \
               || curl -fsS "http://${{ secrets.VM_HOST }}:${DEPLOY_PORT}/health" >/dev/null 2>&1 \
               || curl -fsS "http://${{ secrets.VM_HOST }}:${DEPLOY_PORT}/" >/dev/null 2>&1; then
              echo "✅ FastAPI is live at http://${{ secrets.VM_HOST }}:${DEPLOY_PORT} (docs: /docs)"
              exit 0
            fi
            sleep 5
          done
          echo "❌ public health check failed"
          exit 1
