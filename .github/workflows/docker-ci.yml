name: Docker CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t fastapi-quick-starter:latest .

  deploy:
    name: Deploy (simulated)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Simulate deploy
        run: echo "Deploying fastapi-quick-starter:latest (simulated)"

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs:
      - build
      - deploy
    if: ${{ always() }}
    steps:
      - name: Report pipeline summary
        run: |
          echo "Build result: ${{ needs.build.result }}"
          echo "Deploy result: ${{ needs.deploy.result }}"
          echo "Docker image fastapi-quick-starter:latest processed (simulated)"
