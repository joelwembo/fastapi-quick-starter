name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run linters (flake8)
        run: |
          pip install flake8
          flake8 .

      - name: Run tests (pytest)
        run: |
          pip install pytest
          pytest

      - name: Build Docker image
        run: |
          docker build -t fastapi-quick-starter:latest .

  push_to_registry:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/fastapi-quick-starter:${GITHUB_SHA} .
          docker push ${{ secrets.DOCKER_USERNAME }}/fastapi-quick-starter:${GITHUB_SHA}

      - name: Tag and push "latest"
        run: |
          docker tag ${{ secrets.DOCKER_USERNAME }}/fastapi-quick-starter:${GITHUB_SHA} ${{ secrets.DOCKER_USERNAME }}/fastapi-quick-starter:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/fastapi-quick-starter:latest

  deploy:
    needs: push_to_registry
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOYMENT_HOST }}
          username: ${{ secrets.DEPLOYMENT_USER }}
          key: ${{ secrets.DEPLOYMENT_PRIVATE_KEY }}
          port: ${{ secrets.DEPLOYMENT_PORT }}
          script: |
            docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
            docker pull ${{ secrets.DOCKER_USERNAME }}/fastapi-quick-starter:latest
            docker stop fastapi-app || true
            docker rm fastapi-app || true
            docker run -d -p 8000:8000 --name fastapi-app ${{ secrets.DOCKER_USERNAME }}/fastapi-quick-starter:latest